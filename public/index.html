<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nieuwe offerte — Don Vloeren</title>
  <link rel="stylesheet" href="/css/stijl.css" />
</head>
<body class="formulier-pagina">

  <div class="topbalk">
    <img src="/images/logo.png" alt="Don Vloeren logo" class="logo" />
    <a href="/overzicht">Overzicht offertes &amp; facturen →</a>
  </div>

  <div class="formulier-inhoud">
    <h1>Nieuwe offerte maken</h1>
    <p class="subtitel">Vul de gegevens van de klant en de klus in. De offerte wordt automatisch berekend en opgemaakt.</p>

    <form id="offerte-formulier" method="POST" action="/offerte/nieuw">

      <!-- ============== KLANTGEGEVENS ============== -->
      <div class="kaart">
        <h2>Klantgegevens</h2>
        <div class="veld-grid">
          <div class="veld-groep span-2">
            <label for="klantNaam">Naam</label>
            <input type="text" id="klantNaam" name="klantNaam" required />
          </div>
          <div class="veld-groep span-2">
            <label for="klantAdres">Adres</label>
            <input type="text" id="klantAdres" name="klantAdres" required />
          </div>
          <div class="veld-groep">
            <label for="klantPostcode">Postcode</label>
            <input type="text" id="klantPostcode" name="klantPostcode" required />
          </div>
          <div class="veld-groep">
            <label for="klantPlaats">Plaats</label>
            <input type="text" id="klantPlaats" name="klantPlaats" required />
          </div>
          <div class="veld-groep">
            <label for="klantTelefoon">Telefoon</label>
            <input type="tel" id="klantTelefoon" name="klantTelefoon" required />
          </div>
          <div class="veld-groep">
            <label for="klantEmail">E-mail</label>
            <input type="email" id="klantEmail" name="klantEmail" required />
          </div>
        </div>
      </div>

      <!-- ============== KLUSINFORMATIE ============== -->
      <div class="kaart">
        <h2>Klusinformatie</h2>
        <div class="veld-grid">
          <div class="veld-groep span-2">
            <label for="soortWerk">Soort werk</label>
            <select id="soortWerk" name="soortWerk"></select>
          </div>
          <div class="veld-groep">
            <label for="aantalM2">Aantal m²</label>
            <input type="number" id="aantalM2" name="aantalM2" min="0" step="0.1" required />
          </div>
          <div class="veld-groep">
            <label for="prijsPerM2">Prijs per m² (excl. btw)</label>
            <input type="number" id="prijsPerM2" name="prijsPerM2" min="0" step="0.01" required />
          </div>
        </div>

        <div class="veld-groep" style="margin-top: 10px;">
          <label>Extra werkzaamheden (optioneel)</label>
          <div id="extra-werk-lijst"></div>
          <button type="button" id="knop-extra-toevoegen" class="knop-extra-toevoegen">+ Extra werk toevoegen</button>
        </div>

        <div class="veld-groep span-2" style="margin-top: 16px;">
          <label for="opmerkingen">Opmerkingen</label>
          <textarea id="opmerkingen" name="opmerkingen" rows="3" placeholder="Bijv. bijzonderheden over de klus, afspraken, etc."></textarea>
        </div>

        <div class="live-totaal" id="live-totaal">
          Subtotaal: <strong id="live-subtotaal">€ 0,00</strong>
          &nbsp;·&nbsp; Btw 21%: <strong id="live-btw">€ 0,00</strong>
          &nbsp;·&nbsp; Totaal: <strong id="live-totaal-bedrag">€ 0,00</strong>
        </div>
      </div>

      <div class="formulier-acties">
        <button type="submit" class="btn btn-goud">Offerte genereren →</button>
      </div>
    </form>
  </div>

  <!-- Template voor een extra werk-rij (wordt door JS gekloond) -->
  <template id="extra-werk-rij-template">
    <div class="extra-werk-rij">
      <input type="text" name="extraOmschrijving" placeholder="Omschrijving (bijv. plinten plaatsen)" />
      <input type="number" name="extraAantal" placeholder="Aantal" min="0" step="0.1" value="1" />
      <input type="number" name="extraPrijs" placeholder="Prijs per stuk" min="0" step="0.01" />
      <button type="button" class="knop-rij-verwijderen" title="Verwijder regel">✕</button>
    </div>
  </template>

  <script src="/js/formulier.js"></script>
</body>
</html>
